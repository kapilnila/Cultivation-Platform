# render.yaml
# Infrastructure as Code for Render deployment
# This file defines all services needed for the Wuxia platform

services:
  # Django Backend API
  - type: web
    name: wuxia-backend
    env: python
    region: oregon  # Choose: oregon, frankfurt, singapore
    plan: free  # Options: free, starter ($7), standard ($25)
    branch: main  # Git branch to deploy
    buildCommand: "sh build.sh"
    startCommand: "gunicorn config.wsgi:application"
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        sync: false  # Set manually
      - key: DATABASE_URL
        fromDatabase:
          name: wuxia-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set manually
      - key: ACCESS_TOKEN_LIFETIME
        value: 60
      - key: REFRESH_TOKEN_LIFETIME
        value: 1440

# PostgreSQL Database
databases:
  - name: wuxia-db
    databaseName: wuxia_cultivation
    user: wuxia_user
    plan: free  # Options: free (limited), starter ($7)
    region: oregon
    ipAllowList: []  # Empty means accessible from anywhere